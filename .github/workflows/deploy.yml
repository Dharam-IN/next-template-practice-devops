name: next-deploy
on:
  push:
    branches:
      - main
jobs:
  DeployNextApp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Login to Docker
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build And Push Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/next-image:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/next-image:latest

      - name: Login to EC2 and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker stop next-container:latest || true
            docker rm next-container:latest || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/next-image:latest
            docker run -d --name next-container:latest -p 80:3000 ${{ secrets.DOCKER_USERNAME }}/next-image:latest